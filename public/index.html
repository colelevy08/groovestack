<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="32x32" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080808" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f8f8" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="GrooveStack — your physical music media hub. Collect, trade, verify, and discover vinyl records with a global community of crate diggers." />
    <meta name="keywords" content="vinyl, records, collecting, trading, music, crate digging, marketplace, community" />
    <meta name="author" content="GrooveStack" />

    <!-- Improvement 16: Microsoft tile meta -->
    <meta name="msapplication-TileColor" content="#080808" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/logo192.png" />
    <meta name="msapplication-config" content="none" />

    <!-- Improvement 17: Preconnect and DNS prefetch hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Improvement 18: Additional comprehensive meta tags -->
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GrooveStack" />

    <!-- Open Graph — iMessage, social link previews -->
    <meta property="og:title" content="GrooveStack — Your Vinyl Record Community" />
    <meta property="og:description" content="Collect, trade, verify, and discover vinyl records with a global community of crate diggers." />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GrooveStack" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GrooveStack — Your Vinyl Record Community" />
    <meta name="twitter:description" content="Collect, trade, verify, and discover vinyl records with a global community of crate diggers." />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GrooveStack" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!-- Improvement 19: Apple splash screen for PWA -->
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/og-image.png" />

    <!-- Structured Data — JSON-LD for vinyl record app -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "GrooveStack",
      "description": "Vinyl record collecting, trading, and community platform",
      "url": "https://groovestack.app",
      "applicationCategory": "EntertainmentApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "127"
      }
    }
    </script>

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>GrooveStack — Vinyl Record Community</title>
  </head>
  <body>
    <!-- Improvement 20: Enhanced noscript fallback -->
    <noscript>
      <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; text-align: center; padding: 3rem 1.5rem; max-width: 480px; margin: 0 auto;">
        <h1 style="font-size: 1.5rem; margin-bottom: 0.75rem;">GrooveStack</h1>
        <p style="color: #666; line-height: 1.6;">JavaScript is required to use GrooveStack. Please enable JavaScript in your browser settings and reload this page to access your vinyl record collection.</p>
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
