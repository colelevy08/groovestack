  <circle cx="256" cy="256" r="180" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.35"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.35"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>
  <!-- Label area -->
  <circle cx="256" cy="256" r="72" fill="#0d0d0d" stroke="url(#g)" stroke-width="5"/>
